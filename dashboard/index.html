<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowgrid | Command Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-primary: #00f2ff;
            --accent-secondary: #ff00ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e6ed;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            background: rgba(0, 255, 128, 0.1);
            color: #00ff80;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            border: 1px solid rgba(0, 255, 128, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 24px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-label {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
        }

        .wide-card {
            grid-column: span 2;
        }

        .worker-list {
            list-style: none;
            margin-top: 10px;
        }

        .worker-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .worker-id {
            font-weight: 500;
            color: var(--accent-primary);
        }

        .worker-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }

        .chart-container {
            height: 200px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .wide-card { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">FLOWGRID <span style="font-weight: 300;">| HUB</span></div>
            <div class="badge" id="cluster-status">Scanning...</div>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-label">Active Workers</div>
                <div class="card-value" id="count-workers">0</div>
            </div>
            <div class="card">
                <div class="card-label">Queue Backlog</div>
                <div class="card-value" id="count-queue">0</div>
                <div style="font-size: 11px; color: var(--text-dim); margin-top: 6px;">
                    <span id="pending-count">0</span> pending &nbsp;|&nbsp; <span id="running-count">0</span> running
                </div>
            </div>
            <div class="card wide-card">
                <div class="card-label">Real-time Throughput (Tasks/Sec)</div>
                <div class="chart-container">
                    <canvas id="throughputChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="card wide-card">
                <div class="card-label">Distributed Worker Pool</div>
                <ul class="worker-list" id="worker-list">
                    <!-- Dynamic Items -->
                </ul>
            </div>
            <div class="card">
                <div class="card-label">Avg Latency</div>
                <div class="card-value" id="avg-latency">-- ms</div>
                <div style="font-size: 12px; color: var(--text-dim); margin-top: 5px;">Based on last window</div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('throughputChart').getContext('2d');
        const throughputChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [{
                    label: 'Tasks/s',
                    data: Array(20).fill(0),
                    borderColor: '#00f2ff',
                    backgroundColor: 'rgba(0, 242, 255, 0.1)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { 
                        beginAtZero: true,
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#94a3b8' }
                    }
                }
            }
        });

        async function updateStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                document.getElementById('count-workers').innerText = data.worker_count;
                document.getElementById('count-queue').innerText = data.total_active;
                document.getElementById('pending-count').innerText = data.queue_size;
                document.getElementById('running-count').innerText = data.running_tasks;
                document.getElementById('avg-latency').innerText = data.avg_latency > 0 ? `${data.avg_latency} ms` : '-- ms';
                document.getElementById('cluster-status').innerText = 'Cluster: Online';
                document.getElementById('cluster-status').style.color = '#00ff80';

                // Update Worker List
                const list = document.getElementById('worker-list');
                list.innerHTML = '';
                let totalLoad = 0;
                data.workers.forEach(w => {
                    totalLoad += w.load;
                    const li = document.createElement('li');
                    li.className = 'worker-item';
                    li.innerHTML = `
                        <div>
                            <span class="worker-id">${w.id}</span>
                            <div style="font-size: 11px; color: var(--text-dim)">Load: ${w.load} tasks</div>
                        </div>
                        <span class="worker-status">${w.status}</span>
                    `;
                    list.appendChild(li);
                });

                // Update Chart (total_active = pending + running tasks)
                throughputChart.data.datasets[0].data.shift();
                throughputChart.data.datasets[0].data.push(data.total_active);
                throughputChart.update('none');

            } catch (err) {
                document.getElementById('cluster-status').innerText = 'Cluster: Offline';
                document.getElementById('cluster-status').style.color = '#ff4d4d';
            }
        }

        setInterval(updateStats, 1000);
        updateStats();
    </script>
</body>
</html>
