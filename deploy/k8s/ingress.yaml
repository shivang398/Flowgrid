apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flowgrid-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: dashboard.flowgrid.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: flowgrid-master-service
            port:
              number: 8080
